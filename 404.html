<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidan finns inte – Budget App</title>
  <link rel="stylesheet" href="src/style.css" />
  <link rel="stylesheet" href="src/dark.css" />
  <style>
    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    .theme-toggle {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 1rem;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: var(--accent-soft);
    }

    .container {
      background: var(--surface);
      padding: 3rem 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      max-width: 500px;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: "Instrument Serif", serif;
      font-size: 4rem;
      font-style: italic;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .home-btn {
      display: inline-block;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      background: var(--accent);
      color: white;
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      transition: opacity 0.18s;
    }

    .home-btn:hover {
      opacity: 0.8;
    }

    .tips {
      background: var(--surface-2);
      padding: 1.5rem;
      border-radius: var(--radius-sm);
      margin-top: 2.5rem;
      text-align: left;
      border: 1px solid var(--border);
    }

    .tips h3 {
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .tips ul {
      margin: 0;
      padding-left: 1.2rem;
      color: var(--text);
      font-size: 0.9rem;
    }

    .tips li {
      margin: 0.4rem 0;
    }
  </style>
</head>

<body>
  <button id="theme-toggle" aria-label="Byt tema"
    style="position:absolute;right:2rem;top:2rem;padding:0.5em 1em;border-radius:8px;border:none;background:var(--surface-2);color:var(--text);cursor:pointer;z-index:10;">
    <img id="theme-icon" src="img/light-mode.svg" alt="Byt tema ikon" width="24" height="24"
      style="vertical-align:middle;" />
  </button>
  <div class="container">
    <h1>404</h1>
    <p>Hoppsan! Sidan du letar efter verkar ha tagit semester.</p>

    <a href="index.html" class="home-btn">Gå tillbaka till appen</a>

  </div>

  <script>
    const THEME_KEY = "budget-theme";
    const themeToggleBtn = document.getElementById("theme-toggle");
    const themeIcon = document.getElementById("theme-icon");
    function setTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("dark");
        if (themeIcon) themeIcon.src = "img/dark-mode.svg";
      } else {
        document.body.classList.remove("dark");
        if (themeIcon) themeIcon.src = "img/light-mode.svg";
      }
      localStorage.setItem(THEME_KEY, theme);
    }
    function toggleTheme() {
      const isDark = document.body.classList.contains("dark");
      setTheme(isDark ? "light" : "dark");
    }
    themeToggleBtn.addEventListener("click", toggleTheme);
    // Init theme on load
    const savedTheme = localStorage.getItem(THEME_KEY);
    if (savedTheme) {
      setTheme(savedTheme);
    } else {
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(prefersDark ? "dark" : "light");
    }
  </script>
</body>

</html>
